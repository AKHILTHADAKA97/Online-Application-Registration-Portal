version: '3.8'

services:
  # Frontend Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: registration-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - app-network
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    restart: unless-stopped

  # Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: registration-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - JWT_SECRET=your-secret-key-change-this-in-production
      - NODE_ENV=production
      - ADMIN_EMAIL=admin@example.com
      - ADMIN_PASSWORD=admin123
      - USE_FIREBASE_EMULATOR=false
      # For Firebase (use either production or emulator):
      # - GOOGLE_APPLICATION_CREDENTIALS=/app/firebase-key.json
    depends_on:
      - firebase-emulator
    networks:
      - app-network
    volumes:
      - ./backend:/app
    restart: unless-stopped

  # Firebase Emulator (optional - for local development without Firebase account)
  firebase-emulator:
    image: osfr/firebase-emulator:latest
    container_name: firebase-emulator
    ports:
      - "4000:4000"  # Emulator UI
      - "8080:8080"  # Firestore
      - "9099:9099"  # Auth
      - "9199:9199"  # Realtime Database
    environment:
      - FIREBASE_PROJECT_ID=registration-portal-demo
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  firebase-data:
    driver: local
